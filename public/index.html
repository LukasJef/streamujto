<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMUJ.ATRIXX</title>
    <style>
        :root {
            --bg-dark: #0b0b0b;
            --card-bg: #141414;
            --accent-red: #e50914;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-red);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
            user-select: none;
        }

        .library-toggle {
            background: transparent;
            border: 2px solid #333;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }
        .library-toggle:hover {
            border-color: var(--accent-red);
            background: rgba(229, 9, 20, 0.1);
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 40px auto;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid #222;
            background: #181818;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            padding: 15px 30px;
            background: var(--accent-red);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: #b0070f;
        }

        /* NETFLIX MŘÍŽKA FILMŮ */
        #movieGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            width: 100%;
            padding-top: 10px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .poster-container {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #222;
            overflow: hidden;
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            background: linear-gradient(45deg, #141414, #262626);
            color: var(--text-dim);
            font-size: 14px;
            font-weight: bold;
        }

        .movie-card-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .movie-card:hover .movie-card-overlay {
            opacity: 1;
        }

        .play-icon {
            font-size: 40px;
            color: white;
            transform: scale(0.8);
            transition: transform 0.2s ease;
        }

        .movie-card:hover .play-icon {
            transform: scale(1);
        }

        .movie-card-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .movie-card-info h3 {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .movie-card-year {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* FILMOVÝ MODAL OVERLAY (Kinomód) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #101010;
            width: 100%;
            max-width: 950px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            border: 1px solid #222;
            position: relative;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .close-modal-btn:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        /* STREAMY LIST */
        .file-list-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            background: #181818;
            border: 1px solid #252525;
            padding: 14px 20px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-item:hover {
            background: #222;
            border-color: #444;
            transform: translateX(4px);
        }

        .file-info-left {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .file-play-icon {
            color: var(--accent-red);
            font-size: 14px;
        }

        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-info-right {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .loading, .loading-files {
            text-align: center;
            color: var(--text-dim);
            padding: 30px;
            font-style: italic;
            width: 100%;
            grid-column: 1 / -1;
        }

        /* Knihovna panel */
        .cache-menu {
            position: absolute;
            top: 70px; right: 20px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Hlavička webu -->
        <header>
            <h1 style="cursor:pointer;" id="logoHome">STREAMUJ.ATRIXX</h1>
            <button class="library-toggle" id="libToggleBtn">★ Moje knihovna</button>
        </header>

        <!-- Panel oblíbených filmů (Skrytý jako default) -->
        <div id="cacheMenu" class="cache-menu" style="display: none;">
            <h3 style="margin: 0 0 12px 0; font-size: 14px; color: var(--text-dim); text-transform: uppercase;">Oblíbené tituly</h3>
            <div id="favoritesList"></div>
        </div>

        <!-- Hlavní vyhledávací panel -->
        <div class="search-box" id="mainSearchBox">
            <input type="text" id="searchInput" placeholder="Zadej název filmu nebo seriálu...">
            <button id="searchBtn">Hledat</button>
        </div>

        <!-- Mřížka čistých filmových karet (IMDb/CZDB Grid) -->
        <div id="movieGrid"></div>
    </div>

    <!-- PŘEPRACOVANÝ DETAIL FILMU (Kinomód Modal) -->
    <div id="movieDetailModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn" id="closeDetailBtn">✕</button>
            
            <!-- Billboard s trailerem nebo plakátem -->
            <div id="detailBillboard" style="position: relative; width: 100%; min-height: 450px; background-size: cover; background-position: center; display: flex; align-items: flex-end;">
                
                <!-- Zde se na pozadí načte ztišená ukázka -->
                <div id="trailerEmbedContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.4; overflow: hidden;"></div>
                
                <!-- Stmívací vrstva (gradient) -->
                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(16,16,16,0) 20%, rgba(16,16,16,0.8) 70%, rgba(16,16,16,1) 100%);"></div>
                
                <!-- Informační vrstva -->
                <div style="position: relative; padding: 40px; width: 100%; box-sizing: border-box; z-index: 5;">
                    <h2 id="detailTitle" style="font-size: 42px; margin: 0 0 15px 0; font-weight: 800; text-shadow: 0 4px 10px rgba(0,0,0,0.9);">Název filmu</h2>
                    
                    <!-- Doplňková tlačítka (Zvuk traileru) -->
                    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                        <button id="detailSoundBtn" style="width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 2px solid #fff; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">🔇</button>
                    </div>

                    <!-- Spodní sekce: Popisek filmu vs Obsazení -->
                    <div style="display: flex; gap: 30px; flex-wrap: wrap; background: rgba(16,16,16,0.6); padding: 20px; border-radius: 8px; border: 1px solid #222;">
                        <div style="flex: 2; min-width: 300px;">
                            <div id="detailMetaRow" style="color: var(--text-dim); font-size: 14px; margin-bottom: 15px; font-weight: bold; letter-spacing: 0.5px;"></div>
                            <p id="detailDescription" style="font-size: 15px; line-height: 1.6; color: #ddd; margin: 0;">Načítám detaily z ČSFD...</p>
                        </div>
                        <div id="detailCrewRow" style="flex: 1; min-width: 230px; font-size: 14px; color: #bbb; line-height: 1.8; border-left: 1px solid #222; padding-left: 20px;"></div>
                    </div>

                    <!-- SEZNAM DOSTUPNÝCH ONLINE STREAMŮ -->
                    <h3 style="margin: 30px 0 15px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;">Dostupné online streamy (Přehraj.to):</h3>
                    <div id="fileListContainer" class="file-list-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Propojení skriptu -->
    <script src="app.js"></script>
</body>
</html>
