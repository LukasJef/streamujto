<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMUJ.ATRIXX</title>
    <style>
        :root {
            --bg-dark: #0b0b0b;
            --card-bg: #141414;
            --accent-red: #e50914;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Horní lišta / Hlavička */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-red);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
            user-select: none;
        }

        /* Tlačítko pro knihovnu */
        .library-toggle {
            background: transparent;
            border: 2px solid #333;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }
        .library-toggle:hover {
            border-color: var(--accent-red);
            background: rgba(229, 9, 20, 0.1);
        }

        /* Vyhledávací box */
        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 40px auto;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid #222;
            background: #181818;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            padding: 15px 30px;
            background: var(--accent-red);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: #b0070f;
        }

        /* Menu oblíbených (Dropdown / Panel) */
        .cache-menu {
            position: absolute;
            top: 70px;
            right: 20px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* Načítání a chyby */
        .loader {
            text-align: center;
            color: var(--text-dim);
            font-size: 16px;
            padding: 40px;
        }
        .no-results, .error {
            text-align: center;
            color: #ff3333;
            font-size: 16px;
            padding: 40px;
        }

        /* Styly pro select boxy v detailu aby ladily k designu */
        select {
            outline: none;
            font-weight: bold;
            padding: 0 12px;
        }
        select option {
            background: #141414;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Hlavička webu -->
        <header>
            <h1 onclick="closeMovieDetail()" style="cursor:pointer;">STREAMUJ.ATRIXX</h1>
            <button class="library-toggle" onclick="toggleCacheMenu()">★ Moje knihovna</button>
        </header>

        <!-- Panel oblíbených filmů (Skrytý jako default) -->
        <div id="cacheMenu" class="cache-menu" style="display: none;">
            <h3 style="margin: 0 0 12px 0; font-size: 14px; color: var(--text-dim); text-transform: uppercase;">Oblíbené tituly</h3>
            <div id="favoritesList">
                <!-- Sem JavaScript vykresluje oblíbené položky -->
            </div>
        </div>

       <!-- Hlavní vyhledávací panel -->
<div class="search-box" id="mainSearchBox">
    <input type="text" id="searchInput" placeholder="Zadej název filmu nebo seriálu...">
    <button id="searchBtn">Hledat</button>
</div>

<!-- Mřížka čistých filmových karet (IMDb Grid) -->
<div id="movieGrid"></div>

        <!-- PRÉMIOVÝ DETAIL FILMU (Styl Netflix / Stremio) -->
        <div id="movieDetailView" style="display: none; position: relative; width: 100%; background: #0b0b0b; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 40px; border: 1px solid #222;">
            
            <!-- Billboard s trailerem nebo plakátem na pozadí -->
            <div id="detailBillboard" style="position: relative; width: 100%; min-height: 480px; background-size: cover; background-position: center; display: flex; align-items: flex-end;">
                
                <!-- Zde se na pozadí načte ztišená ukázka z Youtube -->
                <div id="trailerEmbedContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.4; overflow: hidden;"></div>
                
                <!-- Stmívací vrstva (gradient) zaručující čitelnost textu -->
                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(11,11,11,0.1) 30%, rgba(11,11,11,0.8) 70%, rgba(11,11,11,1) 100%);"></div>
                
                <!-- Informační vrstva a ovládací lišta -->
                <div style="position: relative; padding: 40px; width: 100%; box-sizing: border-box; z-index: 5;">
                    <h2 id="detailTitle" style="font-size: 48px; margin: 0 0 20px 0; font-weight: 800; text-shadow: 0 4px 10px rgba(0,0,0,0.8);">Název filmu</h2>
                    
                    <!-- Ovládací Řada (Tlačítka a výběr streamů) -->
                    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;">
                        
                        <!-- Přehrát soubor -->
                        <div style="display: flex; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                            <button id="mainPlayBtn" style="padding: 14px 28px; background: var(--accent-red); color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer;" onclick="playSelectedFile()">▶ Přehrát</button>
                            <select id="streamSelector" style="background: #b0070f; color: white; border: none; padding: 0 10px; font-size: 16px; cursor: pointer;" onchange="syncSelectedStream()"></select>
                        </div>

                        <!-- Tlačítko ČSFD -->
                        <a id="csfdLinkBtn" href="#" target="_blank" style="display:none; height: 46px; background: white; border-radius: 4px; padding: 0 15px; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                            <img src="https://image.pmgstatic.com/files/svg/logos/logo-short-red.svg" style="height:22px;">
                        </a>
                        
                        <!-- Tlačítko IMDb -->
                        <a id="imdbLinkBtn" href="#" target="_blank" style="display:none; height: 46px; background: #f5c518; color: black; font-weight: bold; font-size: 16px; padding: 0 15px; border-radius: 4px; align-items: center; text-decoration: none; justify-content: center; font-family: sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">IMDb</a>

                        <!-- Stáhnout soubor -->
                        <div style="display: flex; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                            <button id="mainDownloadBtn" style="padding: 14px 24px; background: white; color: black; border: none; font-size: 16px; font-weight: bold; cursor: pointer;" onclick="downloadSelectedFile()">⬇ Stáhnout</button>
                            <select id="downloadSelector" style="background: #e0e0e0; color: black; border: none; padding: 0 10px; font-size: 16px; cursor: pointer; border-left: 1px solid #ccc;"></select>
                        </div>
                    </div>

                    <!-- Doplňková tlačítka (Oblíbené + Zvuk traileru) -->
                    <div style="display: flex; gap: 15px; margin-bottom: 25px;">
                        <button id="detailFavBtn" style="width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 2px solid #fff; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">+</button>
                        <button id="detailSoundBtn" onclick="toggleTrailerMute()" style="width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 2px solid #fff; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">🔇</button>
                    </div>

                    <!-- Spodní sekce: Popisek filmu vs Obsazení a štáb -->
                    <div style="display: flex; gap: 40px; flex-wrap: wrap; background: rgba(11,11,11,0.5); padding: 20px; border-radius: 8px;">
                        <div style="flex: 2; min-width: 300px;">
                            <div id="detailMetaRow" style="color: var(--text-dim); font-size: 14px; margin-bottom: 15px; font-weight: bold; letter-spacing: 0.5px;"></div>
                            <p id="detailDescription" style="font-size: 15px; line-height: 1.6; color: #ddd; margin: 0;"></p>
                        </div>
                        <div id="detailCrewRow" style="flex: 1; min-width: 250px; font-size: 14px; color: #bbb; line-height: 1.8; border-left: 1px solid #222; padding-left: 20px;">
                            <!-- Zde se zobrazí Hrají / Režie -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Integrovaný HTML5 Video Přehrávač (Zobrazí se pod billboardem při kliku na Přehrát) -->
            <div id="playerContainer" style="display: none; width: 100%; background: #000; padding: 10px 0; border-top: 2px solid #222;">
                <video id="videoPlayer" controls crossorigin="anonymous" style="width:100%; max-height: 560px; display: block; margin: 0 auto;"></video>
            </div>
        </div>

    </div>

    <!-- Propojení na tvůj upravený logický skript -->
    <script src="app.js"></script>
</body>
</html>
