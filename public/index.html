<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMUJ.ATRIXX</title>
    <style>
        :root {
            --bg-dark: #0b0b0b;
            --card-bg: #141414;
            --accent-red: #e50914;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--accent-red);
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        /* TLAČÍTKA */
        .btn-premium {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-premium:hover {
            background: rgba(255,255,255,0.2);
        }

        /* UKLIZENÝ VYHLEDÁVACÍ BOX */
        .search-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin: 40px auto;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search-container input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: #181818;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-container button {
            padding: 15px 30px;
            background: var(--accent-red);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-container button:hover {
            background: #b0070f;
        }

        /* KNIHOVNA / CACHE MENU */
        .cache-menu {
            background: #181818;
            border: 1px solid #282828;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        /* SEKCE DETAILU FILMU */
        .movie-detail-view {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .billboard {
            position: relative;
            width: 100%;
            height: 480px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
        }

        .billboard-gradient {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 50%, #000000 100%);
            z-index: 1;
        }

        /* VIDEO INTEGRACE */
        .trailer-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .detail-body {
            position: relative;
            z-index: 2;
            padding: 40px;
            box-sizing: border-box;
            background: #000;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            color: white;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .meta-row { color: var(--text-dim); font-size: 14px; margin: 10px 0; }
        .crew-row { font-size: 15px; margin: 15px 0; color: #ddd; }
        .description { line-height: 1.6; color: #e5e5e5; max-width: 800px; margin-bottom: 30px; }

        /* AKČNÍ LINKY A DROPDOWNY */
        .controls-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-top: 25px;
            background: #111;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #222;
        }

        .selector-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .selector-box label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: bold;
        }

        select {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            max-width: 300px;
        }

        .btn-action {
            padding: 11px 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .btn-play { background: var(--accent-red); color: white; }
        .btn-download { background: #333; color: white; }
        .btn-fav { background: #222; color: #ffb703; font-size: 16px; border: 1px solid #333; }
        
        .external-links { display: flex; gap: 10px; }
        .btn-link { text-decoration: none; padding: 11px 18px; font-weight: 900; border-radius: 4px; font-size: 14px; }
        .btn-csfd { background: #b11212; color: white; }
        .btn-imdb { background: #f5c518; color: black; }

        /* LIVE PLAYER PANEL */
        .player-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            margin-top: 20px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .player-container video { width: 100%; height: 100%; }

        /* POMOCNÉ TŘÍDY */
        .loader, .no-results, .error { text-align: center; padding: 40px; color: var(--text-dim); font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HLAVNÍ HEADER S LOGEM A KNIHOVNOU -->
        <header>
            <h1 style="cursor: pointer;" onclick="closeMovieDetail()">STREAMUJ.ATRIXX</h1>
            <button class="btn-premium" onclick="toggleCacheMenu()">★ Moje knihovna</button>
        </header>

        <!-- SEKCE OBLÍBENÝCH (CACHE MENU) -->
        <div id="cacheMenu" class="cache-menu" style="display: none;">
            <h3 style="margin-top: 0; color: #fff;">Moje oblíbené tituly:</h3>
            <div id="favoritesList"></div>
        </div>

        <!-- JEDINÝ VYHLEDÁVACÍ BOX NA STRÁNCE -->
        <div id="mainSearchBox" class="search-container">
            <input type="text" id="searchQuery" placeholder="Zadej název filmu a stiskni Enter...">
            <button onclick="searchMovies()">Hledat</button>
        </div>

        <!-- MŘÍŽKA VÝSLEDKŮ VYHLEDÁVÁNÍ -->
        <div id="results"></div>

        <!-- DETAIL FILMU (KINOMÓD) -->
        <div id="movieDetailView" class="movie-detail-view" style="display: none;">
            
            <!-- VIZUÁLNÍ BANER (S TRAILEREM NA POZADÍ) -->
            <div id="detailBillboard" class="billboard">
                <div class="trailer-background" id="trailerEmbedContainer"></div>
                <div class="billboard-gradient"></div>
                <button class="close-btn" onclick="closeMovieDetail()">✕</button>
                <button id="detailSoundBtn" onclick="toggleTrailerMute()" style="position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.6); color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; z-index:10;">🔇</button>
            </div>

            <!-- DETAILNÍ TEXTY A OVLÁDÁNÍ STREAMU -->
            <div class="detail-body">
                <h2 id="detailTitle" style="font-size: 36px; margin: 0 0 10px 0;"></h2>
                <div id="detailMetaRow" class="meta-row"></div>
                <div id="detailCrewRow" class="crew-row"></div>
                <p id="detailDescription" class="description"></p>

                <!-- AKČNÍ LIŠTA PRO PŘEHRÁVÁNÍ A STAHOVÁNÍ -->
                <div class="controls-wrapper">
                    
                    <!-- Přehrávač selektor -->
                    <div class="selector-box">
                        <label>Výběr streamu:</label>
                        <select id="streamSelector" onchange="syncSelectedStream()"></select>
                    </div>
                    <button class="btn-action btn-play" onclick="playSelectedFile()">▶ Přehrát</button>

                    <!-- Stahování selektor (skrytý/synchronizovaný na pozadí) -->
                    <select id="downloadSelector" style="display: none;"></select>
                    <button class="btn-action btn-download" onclick="downloadSelectedFile()">💾 Stáhnout</button>
                    
                    <!-- Oblíbené -->
                    <button id="detailFavBtn" class="btn-action btn-fav">+</button>

                    <!-- Externí databáze -->
                    <div class="external-links">
                        <a id="csfdLinkBtn" target="_blank" class="btn-link btn-csfd">ČSFD</a>
                        <a id="imdbLinkBtn" target="_blank" class="btn-link btn-imdb">IMDb</a>
                    </div>
                </div>

                <!-- INTEGRACE LIVE HTML5 PŘEHRÁVAČE -->
                <div id="playerContainer" class="player-container" style="display: none;">
                    <video id="videoPlayer" controls></video>
                </div>

            </div>
        </div>
    </div>

    <!-- NAČTENÍ JEDINÉ INSTANCE JAVASCRIPTU NA KONCI STRÁNKY -->
    <script src="app.js"></script>
</body>
</html>
