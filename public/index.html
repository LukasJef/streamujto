<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMUJ.ATRIXX</title>
    <style>
        :root {
            --bg-dark: #0b0b0b;
            --card-bg: #141414;
            --accent-red: #e50914;
            --text-main: #ffffff;
            --text-dim: #a3a3a3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-red);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
            user-select: none;
        }

        .library-toggle {
            background: transparent;
            border: 2px solid #333;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 40px auto;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid #222;
            background: #181818;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            padding: 15px 30px;
            background: var(--accent-red);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* FILMOVÁ MŘÍŽKA */
        #movieGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .poster-container {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #1f1f1f;
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
        }

        .movie-card-info {
            padding: 12px;
        }

        .movie-card-info h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-card-year {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* MODAL KINOMÓD */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 1100px;
            background: #000000;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .close-modal-btn {
            position: absolute;
            top: 25px; right: 25px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* BILLBOARD / BANER */
        .billboard {
            position: relative;
            width: 100%;
            height: 550px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .billboard-bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .billboard-video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.5;
        }

        .billboard-gradient {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 60%, #000000 100%);
            z-index: 3;
        }

        .billboard-details {
            position: relative;
            z-index: 4;
            padding: 40px;
            width: 100%;
            box-sizing: border-box;
        }

        .movie-title-large {
            font-size: 56px;
            font-weight: 800;
            margin: 0 0 25px 0;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* TLAČÍTKA S ROZBALOVACÍ ŠIPKOU */
        .action-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn-play-split {
            display: flex;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            overflow: hidden;
        }
        .btn-play-main {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-play-main:hover {
            background: #b0070f;
        }
        .btn-play-arrow {
            padding: 12px 16px;
            background: rgba(0,0,0,0.15);
            border-left: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .btn-play-arrow:hover {
            background: rgba(0,0,0,0.3);
        }

        .btn-csfd {
            background: #b11212;
            color: white;
            border: none;
            padding: 12px 18px;
            font-weight: 900;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-imdb {
            background: #f5c518;
            color: #000000;
            border: none;
            padding: 12px 18px;
            font-weight: 900;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-download {
            background: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-download:hover {
            background: #e0e0e0;
        }

        .btn-circle {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* INFO SEKCE */
        .info-columns {
            display: flex;
            gap: 50px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .info-left {
            flex: 3;
            min-width: 300px;
        }
        .info-right {
            flex: 2;
            min-width: 250px;
            font-size: 14px;
            color: #cccccc;
            line-height: 1.8;
        }

        .meta-genres {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .meta-specs {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
        .movie-plot {
            font-size: 15px;
            line-height: 1.6;
            color: #e0e0e0;
            margin: 0;
        }

        /* SKRYTÁ SEKCE STREAMŮ (Zobrazí se až po kliku na šipku) */
        .streams-section {
            padding: 0 40px 40px 40px;
            display: none; /* Skryto defaultně */
        }
        .streams-section.visible {
            display: block;
        }
        
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .file-row {
            background: #121212;
            border: 1px solid #222;
            padding: 15px 20px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-row:hover {
            background: #1c1c1c;
        }
        
        /* Styl pro označený/vybraný soubor */
        .file-row.selected {
            border-color: var(--accent-red);
            background: rgba(229, 9, 20, 0.1);
        }
        .file-row.selected .file-title-text {
            color: var(--accent-red);
            font-weight: bold;
        }

        .file-title-text {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-meta-text {
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            gap: 15px;
        }
        .loading-text {
            color: var(--text-dim);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="logoHome" style="cursor:pointer;">STREAMUJ.ATRIXX</h1>
            <button class="library-toggle">★ Moje knihovna</button>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Zadej název filmu nebo seriálu...">
            <button id="searchBtn">Hledat</button>
        </div>

        <div id="movieGrid"></div>
    </div>

    <!-- DETAIL FILMU MODAL -->
    <div id="movieDetailModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn" id="closeDetailBtn">✕</button>
            
            <div class="billboard">
                <img id="detailBillboardImg" referrerpolicy="no-referrer" class="billboard-bg-img" src="" alt="">
                <div id="trailerEmbedContainer" class="billboard-video-container"></div>
                <div class="billboard-gradient"></div>
                
                <div class="billboard-details">
                    <h2 id="detailTitle" class="movie-title-large">Název</h2>
                    
                    <div class="action-row">
                        <div class="btn-play-split">
                            <div class="btn-play-main" id="actionPlayBtn"><span>▶</span> Přehrát</div>
                            <div class="btn-play-arrow" id="btnToggleStreams">⋁</div>
                        </div>
                        <button class="btn-csfd" id="btnCsfdLink">ČSFD</button>
                        <button class="btn-imdb" id="btnImdbLink">IMDb</button>
                        <button class="btn-download" id="actionDownloadBtn"><span>⬇</span> Stáhnout</button>
                        <button class="btn-circle">＋</button>
                        <button class="btn-circle" id="detailSoundBtn">🔇</button>
                    </div>

                    <div class="info-columns">
                        <div class="info-left">
                            <div id="detailGenres" class="meta-genres"></div>
                            <div id="detailSpecs" class="meta-specs"></div>
                            <p id="detailDescription" class="movie-plot">Načítám text obsahu...</p>
                        </div>
                        <div id="detailCrew" class="info-right"></div>
                    </div>
                </div>
            </div>

            <!-- CHYTRÁ SEKCE SOUBORŮ -->
            <div id="streamsSection" class="streams-section">
                <h3 style="margin: 0 0 5px 0; font-size: 18px; letter-spacing: 0.5px;">Vyberte preferovaný soubor:</h3>
                <span style="font-size: 13px; color: var(--text-dim);">Kliknutím soubor označíte, tlačítky nahoře ho pak spustíte/stáhnete.</span>
                <div id="fileListContainer" class="file-list"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
