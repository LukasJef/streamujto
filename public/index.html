<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamuj.atrixx</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #181818;
            --accent: #e50914; 
            --text: #ffffff;
            --text-dim: #bbbbbb;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1.logo {
            text-align: center;
            color: var(--accent);
            font-size: 2.3rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex-grow: 1;
            padding: 15px;
            border: none;
            border-radius: 4px;
            background-color: var(--card-bg);
            color: white;
            font-size: 16px;
        }
        button.btn-search {
            padding: 15px 35px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .movie-card {
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .movie-card:hover { transform: scale(1.04); }
        .movie-card img { width: 100%; height: 230px; object-fit: cover; }
        .movie-card h3 { font-size: 13px; margin: 8px 0; padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-card p { font-size: 11px; color: var(--text-dim); padding: 0 8px 8px 8px; margin: 0; }

        /* Filmová karta podle zaslané předlohy */
        .movie-detail-view {
            display: none;
            width: 100%;
            min-height: 500px;
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .detail-overlay {
            padding: 40px;
            background: linear-gradient(to top, #0c0c0c 15%, rgba(12,12,12,0.5) 60%, rgba(12,12,12,0.85) 100%);
            min-height: 500px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .detail-title { font-size: 3.5rem; margin: 0 0 20px 0; font-weight: 8xl; text-shadow: 2px 2px 8px #000; }
        
        .action-row { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-play { background-color: var(--accent); color: white; padding: 12px 40px; font-weight: bold; font-size: 18px; border: none; border-radius: 4px; cursor: pointer; }
        .context-arrow { background: rgba(0,0,0,0.85); color: white; border: 1px solid #444; padding: 12px 25px; font-size: 16px; border-radius: 4px; cursor: pointer; }
        
        .db-link-logo { background: #b80710; color: white; padding: 10px 20px; font-weight: bold; border-radius: 4px; text-decoration: none; font-size: 15px; display: inline-flex; align-items: center; }
        .db-btn-imdb { background: #f5c518; color: black; padding: 10px 20px; font-weight: bold; border-radius: 4px; text-decoration: none; font-size: 15px; }
        
        .btn-download { background: #ffffff; color: #000000; padding: 12px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .control-icons { display: flex; gap: 12px; margin-bottom: 25px; }
        .icon-circle { background: rgba(0,0,0,0.6); border: 2px solid white; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .icon-circle:hover { background: rgba(255,255,255,0.2); }

        .meta-layout { display: grid; grid-template-columns: 1.21fr 0.79fr; gap: 50px; padding: 15px 0; }
        
        #playerContainer { display: none; margin-bottom: 30px; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        video#videoPlayer { width: 100%; display: block; }
        .loader { text-align: center; padding: 50px; color: var(--text-dim); font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo">STREAMUJ.ATRIXX</h1>

        <div class="search-box">
            <input type="text" id="searchQuery" placeholder="Vyhledat film (Kombinované vyhledávání ČSFD & IMDb)...">
            <button class="btn-search" onclick="search()">Hledat</button>
        </div>

        <div id="playerContainer">
            <video id="videoPlayer" controls crossorigin="anonymous"></video>
        </div>

        <div id="movieDetail" class="movie-detail-view">
            <div id="detailContent" class="detail-overlay"></div>
        </div>

        <div id="results"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
