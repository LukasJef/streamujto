<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamuj.atrixx</title>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --accent: #e50914; 
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1.logo {
            text-align: center;
            color: var(--accent);
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex-grow: 1;
            padding: 15px;
            border: none;
            border-radius: 4px;
            background-color: var(--card-bg);
            color: white;
            font-size: 16px;
        }
        button.btn-search {
            padding: 15px 30px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Filmová mřížka */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .movie-card {
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .movie-card h3 {
            font-size: 14px;
            margin: 8px dynamic;
            padding: 0 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-card p {
            font-size: 12px;
            color: var(--text-dim);
            padding: 0 8px 8px 8px;
            margin: 0;
        }

        /* Detail Filmu podle předlohy */
        .movie-detail-view {
            display: none;
            width: 100%;
            min-height: 450px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            margin-bottom: 40px;
            box-shadow: inset 0 0 100px #141414;
        }
        .detail-overlay {
            padding: 40px;
            background: rgba(0,0,0,0.4);
            min-height: 450px;
            box-sizing: border-box;
        }
        .detail-title {
            font-size: 3rem;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .action-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-play {
            background-color: var(--accent);
            color: white;
            padding: 12px 35px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .context-arrow {
            background: rgba(0,0,0,0.8);
            color: white;
            border: 1px solid #555;
            padding: 12px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .db-btn {
            padding: 8px 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
        }
        .csfd-btn { background-color: #b80710; color: white; }
        .imdb-btn { background-color: #f5c518; color: black; }
        .btn-download {
            background: white;
            color: black;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .control-icons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .icon-circle {
            background: rgba(0,0,0,0.6);
            border: 1px solid white;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meta-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: rgba(20,20,20,0.8);
            padding: 20px;
            border-radius: 6px;
        }
        
        /* Přehrávač */
        #playerContainer {
            display: none;
            margin-bottom: 30px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        video { width: 100%; display: block; }
        .loader { text-align: center; padding: 40px; color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo">STREAMUJ.ATRIXX</h1>

        <div class="search-box">
            <input type="text" id="searchQuery" placeholder="Hledej film nebo seriál přes ČSFD/IMDb...">
            <button class="btn-search" onclick="search()">Hledat</button>
        </div>

        <!-- Detail panel filmu -->
        <div id="movieDetail" class="movie-detail-view">
            <div id="detailContent" class="detail-overlay"></div>
        </div>

        <!-- Video přehrávač -->
        <div id="playerContainer">
            <video id="videoPlayer" controls crossorigin="anonymous"></video>
        </div>

        <!-- Výsledky hledání -->
        <div id="results"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
